<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS LIFF</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4 pb-32">

<div class="flex justify-between mb-4">
  <h1 class="text-xl font-bold">POS</h1>
  <span id="user" class="text-sm text-gray-600"></span>
</div>

<div id="grid" class="grid grid-cols-2 gap-3"></div>

<div class="fixed bottom-0 left-0 w-full bg-white p-4 shadow">
  <div class="flex justify-between">
    <span>รวม</span>
    <span id="total">0</span>
  </div>
  <button onclick="checkout()" 
    class="w-full bg-green-500 text-white p-2 mt-2">
    บันทึกยอด
  </button>
</div>

<script>

const LIFF_ID = "U7f37a4215005ea8d0aed536035a334e7";
const GET_URL = "https://jczfwvug.rpcl.app/webhook/82548253-31b7-4a0f-8945-9028a70be9a6";
const POST_URL = "https://jczfwvug.rpcl.app/webhook/ati-pos-webhook";

let userName = "";
let userId = "";

let products = [];
let cart = [];
let total = 0;

// 🔥 INIT LIFF
async function init(){
  await liff.init({ liffId: LIFF_ID });

  if(!liff.isLoggedIn()){
    liff.login();
    return;
  }

  const profile = await liff.getProfile();

  userName = profile.displayName;
  userId = profile.userId;

  document.getElementById("user").innerText = userName;

  loadProducts();
}

init();

// 🔥 โหลดสินค้า
async function loadProducts(){
  const res = await fetch(GET_URL);
  const data = await res.json();

  products = data.map(p => ({
    name: p.name || p["ชื่อสินค้า"],
    price: Number(p.price || p["ราคาขาย"]),
    image: p.image || p["รูป"] || ""
  }));

  render();
}

// 🔥 render
function render(){
  let html = "";
  products.forEach(p=>{
    html += `
    <div onclick="add('${p.name}',${p.price})"
    class="bg-white p-3 rounded shadow text-center">
      <img src="${p.image || 'https://via.placeholder.com/100'}" class="h-20 mx-auto">
      <p>${p.name}</p>
      <p>${p.price} บาท</p>
    </div>`;
  });

  document.getElementById("grid").innerHTML = html;
}

// 🔥 เพิ่มสินค้า
function add(name,price){
  cart.push({name,price});
  total += price;
  document.getElementById("total").innerText = total;
}

// 🔥 ส่งเข้า n8n
async function checkout(){

  await fetch(POST_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify({
      staff: userName,
      userId: userId,
      items: cart,
      total: total,
      timestamp: new Date().toLocaleString('th-TH')
    })
  });

  alert("บันทึกแล้ว");

  cart = [];
  total = 0;
  document.getElementById("total").innerText = 0;

  liff.closeWindow(); // ปิดหน้าหลังบันทึก
}

</script>
</body>
</html>

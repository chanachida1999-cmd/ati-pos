<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4 pb-32">

<div class="flex justify-between mb-4">
  <h1 class="text-xl font-bold">POS</h1>
  <button onclick="toggleShift()" id="shiftBtn"
    class="bg-blue-500 text-white px-3 py-1 rounded">
    เริ่มกะ
  </button>
</div>

<div id="grid" class="grid grid-cols-2 gap-3"></div>

<div class="fixed bottom-0 left-0 w-full bg-white p-4 shadow">
  <div class="flex justify-between">
    <span>รวม</span>
    <span id="total">0</span>
  </div>
  <button onclick="checkout()" 
    class="w-full bg-green-500 text-white p-2 mt-2">
    บันทึกยอด
  </button>
</div>

<!-- ปิดกะ -->
<div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
  <div class="bg-white p-4 rounded w-80">
    <h2 class="font-bold mb-2">ปิดกะ</h2>
    <p>ยอดขายระบบ: <span id="sysTotal"></span></p>
    <input id="cash" type="number" placeholder="เงินนับจริง"
      class="border w-full p-2 my-2">
    <div id="diff"></div>
    <button onclick="confirmShift()" class="bg-green-500 text-white w-full p-2 mt-2">ยืนยัน</button>
  </div>
</div>

<script>

const GET_URL = "https://jczfwvug.rpcl.app/webhook/82548253-31b7-4a0f-8945-9028a70be9a6";
const POST_URL = "https://jczfwvug.rpcl.app/webhook/ati-pos-webhook";

let products = [];
let cart = [];
let total = 0;
let shiftOpen = false;

async function load(){
  const res = await fetch(GET_URL);
  const data = await res.json();

  // map ให้ชัวร์
  products = data.map(p => ({
    name: p.name || p["ชื่อสินค้า"],
    price: Number(p.price || p["ราคาขาย"]),
    image: p.image || p["รูป"] || ""
  }));

  render();
}

function render(){
  let html = "";
  products.forEach(p=>{
    html += `
    <div onclick="add('${p.name}',${p.price})"
    class="bg-white p-3 rounded shadow text-center">
      <img src="${p.image || 'https://via.placeholder.com/100'}" class="h-20 mx-auto">
      <p>${p.name}</p>
      <p>${p.price} บาท</p>
    </div>`;
  });
  document.getElementById("grid").innerHTML = html;
}

function add(name,price){
  if(!shiftOpen){
    alert("กรุณาเริ่มกะก่อน");
    return;
  }

  cart.push({name,price});
  total += price;
  document.getElementById("total").innerText = total;
}

async function checkout(){
  if(cart.length === 0) return;

  await fetch(POST_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      items: cart
    })
  });

  alert("บันทึกแล้ว");

  cart=[];
  total=0;
  document.getElementById("total").innerText=0;
}

function toggleShift(){
  if(!shiftOpen){
    shiftOpen = true;
    document.getElementById("shiftBtn").innerText = "ปิดกะ";
  }else{
    document.getElementById("modal").classList.remove("hidden");
    document.getElementById("sysTotal").innerText = total;
  }
}

function confirmShift(){
  const cash = Number(document.getElementById("cash").value);
  const diff = cash - total;

  const diffEl = document.getElementById("diff");

  if(diff === 0){
    diffEl.innerHTML = "✅ ตรง";
  }else{
    diffEl.innerHTML = "⚠️ ต่าง: " + diff;
  }

  shiftOpen = false;
  total = 0;
  cart = [];

  document.getElementById("modal").classList.add("hidden");
  document.getElementById("shiftBtn").innerText = "เริ่มกะ";
}

load();

</script>
</body>
</html>
